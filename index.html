<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripp Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f0f0f;color:#e0e0e0}
#map{width:100%;height:100vh;z-index:1}
.hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,15,15,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.hdr h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.06);padding:4px 10px;border-radius:20px;font-size:12px;color:#aaa;margin-left:auto}
.leaflet-popup-content-wrapper{background:#1a1a2e;color:#e0e0e0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);padding:0;overflow:hidden}
.leaflet-popup-content{margin:0;width:300px;max-width:calc(100vw - 60px)}
.leaflet-popup-tip{background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-top:none;border-left:none}
.pp-img{width:100%;height:180px;object-fit:cover;display:block}
.pp-body{padding:14px 16px}
.pp-name{font-size:17px;font-weight:700;margin-bottom:4px;color:#fff}
.pp-addr{font-size:12px;color:#888;margin-bottom:8px;line-height:1.4}
.pp-cmt{font-size:13px;color:#bbb;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid #60a5fa}
.pp-meta{display:flex;gap:12px;font-size:11px;color:#777;flex-wrap:wrap}
.pp-meta span{display:flex;align-items:center;gap:4px}
.pp-transport{display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;padding:5px 10px;background:linear-gradient(135deg,rgba(96,165,250,0.15),rgba(167,139,250,0.15));border-radius:8px;font-size:12px;color:#a5b4fc}
.pp-acts{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)}
.pp-acts button{flex:1;padding:7px 0;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
.pp-acts button:active{transform:scale(0.96)}
.btn-e{background:rgba(96,165,250,0.15);color:#60a5fa}.btn-e:hover{background:rgba(96,165,250,0.25)}
.btn-d{background:rgba(239,68,68,0.15);color:#ef4444}.btn-d:hover{background:rgba(239,68,68,0.25)}
.leaflet-control-zoom{border:none!important;box-shadow:0 4px 16px rgba(0,0,0,0.3)!important}
.leaflet-control-zoom a{background:#1a1a2e!important;color:#ccc!important;border:1px solid rgba(255,255,255,0.08)!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:#252540!important;color:#fff!important}
.leaflet-control-attribution{background:rgba(15,15,15,0.7)!important;color:#555!important;font-size:10px!important}
.leaflet-control-attribution a{color:#777!important}
.rlbl{background:rgba(26,26,46,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:3px 8px;font-size:11px;color:#ccc;white-space:nowrap;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.fab{position:fixed;bottom:28px;right:28px;z-index:1000;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(96,165,250,0.4);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1)}
.sbtn{position:fixed;bottom:28px;right:94px;z-index:1000;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#f472b6,#a78bfa);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(244,114,182,0.4);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.sbtn:hover{transform:scale(1.1)}
.side{position:fixed;top:0;right:-380px;z-index:1500;width:360px;max-width:90vw;height:100vh;background:rgba(15,15,15,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,0.08);transition:right .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:20px 16px}
.side.open{right:0}
.side-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.side-hdr h2{font-size:16px;font-weight:700;color:#fff}
.side-x{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:#aaa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.side-x:hover{background:rgba(255,255,255,0.15);color:#fff}
.tl-i{position:relative;padding:12px 0 12px 32px;border-left:2px solid rgba(255,255,255,0.08);margin-left:10px;cursor:pointer;transition:background .2s;border-radius:8px}
.tl-i:hover{background:rgba(255,255,255,0.03)}
.tl-d{position:absolute;left:-8px;top:16px;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:2px solid #1a1a2e}
.tl-ic{position:absolute;left:6px;top:18px;font-size:13px}
.tl-nm{font-size:14px;font-weight:600;color:#e0e0e0;padding-left:16px}
.tl-dt{font-size:11px;color:#666;margin-top:2px;padding-left:16px}
.tl-tg{display:inline-flex;align-items:center;gap:3px;margin-top:4px;padding:2px 8px;background:rgba(96,165,250,0.1);border-radius:6px;font-size:10px;color:#93c5fd;margin-left:16px}
.tl-h{position:relative;padding:10px 0 10px 32px;border-left:2px solid rgba(255,255,255,0.08);margin-left:10px}
.tl-hd{position:absolute;left:-8px;top:12px;width:14px;height:14px;border-radius:50%;background:#ef4444;border:2px solid #1a1a2e}
.tl-hl{font-size:13px;font-weight:600;color:#fca5a5}
.ov{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.mdl{background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.mdl-h{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
.mdl-h h2{font-size:17px;font-weight:700;color:#fff}
.mdl-x{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:#aaa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mdl-x:hover{background:rgba(255,255,255,0.15);color:#fff}
.mdl-b{padding:16px 20px 20px}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:#999;margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e0e0e0;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#60a5fa}
.fg input::placeholder,.fg textarea::placeholder{color:#555}
.fg textarea{resize:vertical;min-height:60px}
.fg select option{background:#1a1a2e;color:#e0e0e0}
.fh{font-size:11px;color:#555;margin-top:4px}
.btn-p{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s}
.btn-p:hover{opacity:0.9}.btn-p:active{transform:scale(0.98)}
.hint{position:fixed;bottom:96px;right:28px;z-index:1000;background:rgba(26,26,46,0.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);padding:8px 14px;border-radius:20px;font-size:12px;color:#aaa;display:none;pointer-events:none;animation:fh 3s forwards}
@keyframes fh{0%,70%{opacity:1}100%{opacity:0}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:3000;background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ld{position:fixed;inset:0;z-index:5000;background:#0f0f0f;display:flex;align-items:center;justify-content:center;font-size:14px;color:#888;gap:10px}
.ld.off{display:none}
.ld-s{width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:#60a5fa;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:600px){.hdr{padding:10px 14px}.hdr h1{font-size:16px}.leaflet-popup-content{width:260px}.pp-img{height:150px}.pp-body{padding:12px 14px}.pp-name{font-size:15px}.fab{bottom:20px;right:20px;width:50px;height:50px;font-size:24px}.sbtn{bottom:20px;right:84px;width:50px;height:50px;font-size:20px}.hint{bottom:82px;right:20px}.fr{flex-direction:column;gap:0}.side{width:300px}}
</style>
</head>
<body>
<div class="ld" id="ld"><div class="ld-s"></div>読み込み中...</div>
<div class="hdr"><h1>Tripp Map</h1><span class="badge" id="cnt">📍 0 spots</span></div>
<div id="map"></div>
<button class="sbtn" id="sbtn" title="旅のタイムライン">📋</button>
<button class="fab" id="fab" title="場所を登録">+</button>
<div class="hint" id="hint">地図をクリックしてピンの位置を選択</div>
<div class="side" id="side">
  <div class="side-hdr"><h2>旅のタイムライン</h2><button class="side-x" id="sidx">&times;</button></div>
  <div id="tlc"></div>
</div>
<div class="ov" id="ov">
  <div class="mdl">
    <div class="mdl-h"><h2 id="mttl">旅行先を登録</h2><button class="mdl-x" id="mx">&times;</button></div>
    <div class="mdl-b">
      <div class="fg"><label>場所名 *</label><input type="text" id="fN" placeholder="例: 東京タワー" required></div>
      <div class="fg"><label>住所</label><input type="text" id="fA" placeholder="例: 東京都港区芝公園"></div>
      <div class="fr">
        <div class="fg"><label>緯度 *</label><input type="number" id="fLa" step="any" placeholder="35.6586" required></div>
        <div class="fg"><label>経度 *</label><input type="number" id="fLo" step="any" placeholder="139.7454" required></div>
      </div>
      <div class="fh">地図をクリックで自動入力されます</div>
      <div class="fg">
        <label>移動手段</label>
        <select id="fT">
          <option value="train">🚃 電車</option>
          <option value="shinkansen">🚄 新幹線</option>
          <option value="plane">✈️ フライト</option>
          <option value="car">🚗 車</option>
          <option value="bus">🚌 バス</option>
          <option value="walk">🚶 徒歩</option>
        </select>
      </div>
      <div class="fg"><label>一言コメント</label><textarea id="fC" placeholder="印象に残ったことを書きましょう"></textarea></div>
      <div class="fg"><label>写真URL</label><input type="url" id="fP" placeholder="https://example.com/photo.jpg"></div>
      <div class="fr">
        <div class="fg"><label>訪れた日</label><input type="date" id="fDt"></div>
        <div class="fg"><label>時間</label><input type="time" id="fTm"></div>
      </div>
      <button class="btn-p" id="reg">ピンを登録する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var HOME={lat:35.7066,lng:139.8684};
var TI={
  plane:{icon:"✈️",label:"フライト",color:"#60a5fa",dash:"12,8"},
  shinkansen:{icon:"🚄",label:"新幹線",color:"#a78bfa",dash:"4,4"},
  train:{icon:"🚃",label:"電車",color:"#34d399",dash:"6,4"},
  car:{icon:"🚗",label:"車",color:"#fbbf24",dash:"8,6"},
  bus:{icon:"🚌",label:"バス",color:"#f472b6",dash:"4,6"},
  walk:{icon:"🚶",label:"徒歩",color:"#9ca3af",dash:"2,4"}
};

var map=L.map("map",{center:[36.5,138],zoom:5});
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:"abcd",maxZoom:19
}).addTo(map);

var pin=L.divIcon({className:"",html:'<svg width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.27 21.73 0 14 0z" fill="url(#g)" stroke="#fff" stroke-width="1.5"/><circle cx="14" cy="13" r="6" fill="#fff" opacity="0.9"/></svg>',iconSize:[28,40],iconAnchor:[14,40],popupAnchor:[0,-38]});

var hicon=L.divIcon({className:"",html:'<div style="background:#ef4444;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4)">🏠</div>',iconSize:[36,36],iconAnchor:[18,18]});
L.marker([HOME.lat,HOME.lng],{icon:hicon,zIndexOffset:1000}).addTo(map).bindPopup('<div class="pp-body"><div class="pp-name" style="color:#fca5a5">🏠 江戸川区（出発地）</div></div>');

var trips=[],mmap={},rlines=[],rlbls=[];

var sample=[
  {id:"s1",name:"東京タワー",lat:35.6586,lng:139.7454,address:"東京都港区芝公園4-2-8",comment:"東京のシンボル。夜景が特に綺麗だった。",date:"2024-08-15",time:"18:30",photo:"https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600&h=400&fit=crop",transport:"train"},
  {id:"s2",name:"チームラボプラネツ",lat:35.3906,lng:139.7946,address:"東京都江東区豊洲6-1-16",comment:"光とデジタルアートの没入型体験が非常に幻想的だった。",date:"2024-10-20",time:"14:00",photo:"https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=600&h=400&fit=crop",transport:"train"},
  {id:"s3",name:"セレンゲティ国立公園",lat:-2.333,lng:34.833,address:"タンザニア",comment:"野生動物の大移動を間近で見られた。大自然の迫力に圧倒された。",date:"2023-07-10",time:"09:00",photo:"https://images.unsplash.com/photo-1516426122078-c23e76319801?w=600&h=400&fit=crop",transport:"plane"},
  {id:"s4",name:"ギザのピラミッド",lat:29.9792,lng:31.1342,address:"エジプト・ギザ",comment:"紀元前の建造物のスケールに驚いた。壮大だった。",date:"2023-03-05",time:"11:00",photo:"https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?w=600&h=400&fit=crop",transport:"plane"},
  {id:"s5",name:"東京ディズニーランド",lat:35.6329,lng:139.8804,address:"千葉県浦安市舞浜1-1",comment:"魔法のような一日だった。ファイアウォークスが感動的。",date:"2024-05-03",time:"10:00",photo:"https://images.unsplash.com/photo-1570750605820-8755e1a9b5c5?w=600&h=400&fit=crop",transport:"train"},
  {id:"s6",name:"富士山",lat:35.3606,lng:138.7274,address:"静岡県/山梨県",comment:"朝日の出と同時に見た富士山は息を呑むほど美しかった。",date:"2024-01-01",time:"06:30",photo:"https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600&h=400&fit=crop",transport:"car"},
  {id:"s7",name:"伏見稲荷大社",lat:34.9671,lng:135.7727,address:"京都府京都市伏見区",comment:"千本鳥居の並ぶ道はまるで異世界。山頂まで登った。",date:"2024-04-10",time:"08:00",photo:"https://images.unsplash.com/photo-1478436127897-769e1b3f0f36?w=600&h=400&fit=crop",transport:"shinkansen"},
  {id:"s8",name:"富良野ラベンダー畑",lat:43.3421,lng:142.3831,address:"北海道富良野市",comment:"紫色に染まる畑の絶景だった。",date:"2024-07-20",time:"11:00",photo:"https://images.unsplash.com/photo-1589909202802-8f4aadce1849?w=600&h=400&fit=crop",transport:"plane"}
];

function isOver(la,lo){return la<24||la>46||lo<122||lo>154}

function popupHtml(t){
  var h="";
  if(t.photo)h+='<img class="pp-img" src="'+t.photo+'" alt="'+t.name+'" onerror="this.style.display=\'none\'">';
  h+='<div class="pp-body"><div class="pp-name">'+t.name+'</div><div class="pp-addr">'+(t.address||"")+'</div>';
  if(t.transport){var ti=TI[t.transport]||TI.train;h+='<div class="pp-transport"><span>'+ti.icon+'</span><span>江戸川区から'+ti.label+'で移動</span></div>';}
  h+='<div class="pp-cmt">'+(t.comment||"")+'</div><div class="pp-meta"><span>📅 '+(t.date||"-")+'</span><span>🕐 '+(t.time||"-")+'</span></div>';
  h+='<div class="pp-acts"><button class="btn-e" data-a="edit" data-i="'+t.id+'">✏️ 編集</button><button class="btn-d" data-a="del" data-i="'+t.id+'">🗑 削除</button></div></div>';
  return h;
}

function mkRoute(t){
  var ti=TI[t.transport]||TI.train;
  var c=isOver(t.lat,t.lng)?"#60a5fa":ti.color;
  var ll;
  if(isOver(t.lat,t.lng)){ll=[[HOME.lat,HOME.lng],[HOME.lat,t.lng],[t.lat,t.lng]];}
  else{ll=[[HOME.lat,HOME.lng],[t.lat,t.lng]];}
  rlines.push(L.polyline(ll,{color:c,weight:2,opacity:0.5,dashArray:ti.dash}).addTo(map));
  var mla=(HOME.lat+t.lat)/2,mlo=(HOME.lng+t.lng)/2;
  if(isOver(t.lat,t.lng)){mla=t.lat*0.6;mlo=(HOME.lng+t.lng)/2;}
  rlbls.push(L.marker([mla,mlo],{icon:L.divIcon({className:"rlbl",html:ti.icon+" "+ti.label,iconSize:[80,24],iconAnchor:[40,12]}),interactive:false}).addTo(map));
}

function mkMarker(t){
  var m=L.marker([t.lat,t.lng],{icon:pin}).addTo(map);
  m.bindPopup(popupHtml(t),{maxWidth:320,minWidth:260,closeButton:true});
  mmap[t.id]=m;
  mkRoute(t);
}

function clearAll(){
  Object.keys(mmap).forEach(function(k){map.removeLayer(mmap[k])});
  mmap={};
  rlines.forEach(function(l){map.removeLayer(l)});rlines=[];
  rlbls.forEach(function(l){map.removeLayer(l)});rlbls=[];
}

function rebuild(){clearAll();trips.forEach(function(t){mkMarker(t)});}
function stats(){document.getElementById("cnt").textContent="📍 "+trips.length+" spots";}

function timeline(){
  var s=trips.slice().sort(function(a,b){return(a.date||"").localeCompare(b.date||"")});
  var h='<div class="tl-h"><div class="tl-hd"></div><div class="tl-hl">🏠 江戸川区（出発地）</div></div>';
  s.forEach(function(t){
    var ti=TI[t.transport]||TI.train;
    h+='<div class="tl-i" data-id="'+t.id+'"><div class="tl-d"></div><div class="tl-ic">'+ti.icon+'</div><div class="tl-nm">'+t.name+'</div><div class="tl-dt">'+(t.date||"日付未定")+'</div><div class="tl-tg">'+ti.icon+" "+ti.label+'</div></div>';
  });
  document.getElementById("tlc").innerHTML=h;
  document.querySelectorAll(".tl-i").forEach(function(el){
    el.addEventListener("click",function(){
      var id=el.getAttribute("data-id");
      var t=trips.find(function(x){return x.id===id});
      if(!t)return;
      map.setView([t.lat,t.lng],10);
      if(mmap[id])mmap[id].openPopup();
      document.getElementById("side").classList.remove("open");
    });
  });
}

async function loadTrips(){

    if(sb){

var ov=document.getElementById("ov"),mx=document.getElementById("mx"),reg=document.getElementById("reg"),fab=document.getElementById("fab"),hint=document.getElementById("hint"),toast=document.getElementById("toast"),mttl=document.getElementById("mttl"),fLa=document.getElementById("fLa"),fLo=document.getElementById("fLo"),editId=null;

function openM(t){mttl.textContent=t;ov.classList.add("on");}
function closeM(){ov.classList.remove("on");editId=null;}
function clr(){document.getElementById("fN").value="";document.getElementById("fA").value="";fLa.value="";fLo.value="";document.getElementById("fC").value="";document.getElementById("fP").value="";document.getElementById("fDt").value="";document.getElementById("fTm").value="";document.getElementById("fT").value="train";}
function toastMsg(m){toast.textContent=m;toast.style.display="block";toast.classList.add("show");setTimeout(function(){toast.classList.remove("show");setTimeout(function(){toast.style.display="none"},300)},2000);}

document.getElementById("sbtn").addEventListener("click",function(){document.getElementById("side").classList.toggle("open");timeline();});
document.getElementById("sidx").addEventListener("click",function(){document.getElementById("side").classList.remove("open");});
fab.addEventListener("click",function(){editId=null;clr();openM("旅行先を登録");hint.style.display="block";hint.style.animation="none";hint.offsetHeight;hint.style.animation="fh 3s forwards";});
mx.addEventListener("click",closeM);
ov.addEventListener("click",function(e){if(e.target===ov)closeM();});
map.on("click",function(e){fLa.value=e.latlng.lat.toFixed(4);fLo.value=e.latlng.lng.toFixed(4);hint.style.display="none";});

document.addEventListener("click",async function(e){
  var b=e.target.closest("[data-a]");if(!b)return;
  var a=b.getAttribute("data-a"),id=b.getAttribute("data-i");
  if(a==="edit"){startEdit(id);}
  else if(a==="del"){await delTrip(id);}
});

reg.addEventListener("click",async function(){
  var name=document.getElementById("fN").value.trim(),addr=document.getElementById("fA").value.trim();
  var la=parseFloat(fLa.value),lo=parseFloat(fLo.value),cmt=document.getElementById("fC").value.trim();
  var pht=document.getElementById("fP").value.trim(),dt=document.getElementById("fDt").value,tm=document.getElementById("fTm").value,tra=document.getElementById("fT").value;
  if(!name){alert("場所名を入力してください");return;}
  if(isNaN(la)||isNaN(lo)){alert("地図をクリックして位置を選択してください");return;}
  var d={name:name,lat:la,lng:lo,address:addr,comment:cmt,photo:pht,date:dt,time:tm,transport:tra};
  if(editId){
    try{if(sb){var r=await sb.from("tripp").update(d).eq("id",editId).select().single();if(!r.error){var i=trips.findIndex(function(x){return x.id===editId});if(i>=0)trips[i]=r.data;}}else{var i2=trips.findIndex(function(x){return x.id===editId});if(i2>=0)trips[i2]=Object.assign(trips[i2],d);}}catch(e){}
    rebuild();stats();timeline();closeM();toastMsg("ピンを更新しました！");
  }else{
    if(sb){
      try{var r2=await sb.from("tripp").insert(d).select().single();if(!r2.error){trips.unshift(r2.data);rebuild();stats();timeline();closeM();toastMsg("ピンを登録しました！");clr();map.setView([la,lo],10);return;}}catch(e){}
    }
    d.id="user-"+Date.now();trips.unshift(d);rebuild();stats();timeline();closeM();toastMsg("ピンを登録しました！");
  }
  clr();map.setView([la,lo],10);
});

function startEdit(id){
  var t=trips.find(function(x){return x.id===id});if(!t)return;
  editId=id;document.getElementById("fN").value=t.name;document.getElementById("fA").value=t.address||"";
  fLa.value=t.lat;fLo.value=t.lng;document.getElementById("fC").value=t.comment||"";
  document.getElementById("fP").value=t.photo||"";document.getElementById("fDt").value=t.date||"";
  document.getElementById("fTm").value=t.time||"";document.getElementById("fT").value=t.transport||"train";
  openM("旅行先を編集");map.closePopup();
}

async function delTrip(id){
  var t=trips.find(function(x){return x.id===id});if(!t)return;
  if(!confirm("「"+t.name+"」を削除しますか？"))return;
  try{if(sb)await sb.from("tripp").delete().eq("id",id);}catch(e){}
  trips=trips.filter(function(x){return x.id!==id});rebuild();stats();timeline();map.closePopup();toastMsg("ピンを削除しました");
}

loadTrips();
setTimeout(function(){document.getElementById("ld").classList.add("off");},3000);
