<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripp Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f0f0f;color:#e0e0e0}
#map{width:100%;height:100vh;z-index:1}
.header-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,15,15,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.header-bar h1{font-size:18px;font-weight:700;letter-spacing:0.5px;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.06);padding:4px 10px;border-radius:20px;font-size:12px;color:#aaa;margin-left:auto}
.leaflet-popup-content-wrapper{background:#1a1a2e;color:#e0e0e0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);padding:0;overflow:hidden}
.leaflet-popup-content{margin:0;width:300px;max-width:calc(100vw - 60px)}
.leaflet-popup-tip{background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-top:none;border-left:none}
.popup-photo{width:100%;height:180px;object-fit:cover;display:block}
.popup-body{padding:14px 16px}
.popup-name{font-size:17px;font-weight:700;margin-bottom:4px;color:#fff}
.popup-address{font-size:12px;color:#888;margin-bottom:8px;line-height:1.4}
.popup-comment{font-size:13px;color:#bbb;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid #60a5fa}
.popup-meta{display:flex;gap:12px;font-size:11px;color:#777;flex-wrap:wrap}
.popup-meta span{display:flex;align-items:center;gap:4px}
.popup-transport{display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;padding:5px 10px;background:linear-gradient(135deg,rgba(96,165,250,0.15),rgba(167,139,250,0.15));border-radius:8px;font-size:12px;color:#a5b4fc}
.popup-transport .ti{font-size:16px}
.popup-actions{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)}
.popup-actions button{flex:1;padding:7px 0;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s}
.popup-actions button:active{transform:scale(0.96)}
.btn-edit{background:rgba(96,165,250,0.15);color:#60a5fa}
.btn-edit:hover{background:rgba(96,165,250,0.25)}
.btn-delete{background:rgba(239,68,68,0.15);color:#ef4444}
.btn-delete:hover{background:rgba(239,68,68,0.25)}
.leaflet-control-zoom{border:none!important;box-shadow:0 4px 16px rgba(0,0,0,0.3)!important}
.leaflet-control-zoom a{background:#1a1a2e!important;color:#ccc!important;border:1px solid rgba(255,255,255,0.08)!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:#252540!important;color:#fff!important}
.leaflet-control-attribution{background:rgba(15,15,15,0.7)!important;color:#555!important;font-size:10px!important}
.leaflet-control-attribution a{color:#777!important}
.route-label{background:rgba(26,26,46,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:3px 8px;font-size:11px;color:#ccc;white-space:nowrap;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.fab{position:fixed;bottom:28px;right:28px;z-index:1000;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(96,165,250,0.4);transition:transform 0.2s,box-shadow 0.2s;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(96,165,250,0.6)}
.sidebar-toggle{position:fixed;bottom:28px;right:94px;z-index:1000;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#f472b6,#a78bfa);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(244,114,182,0.4);transition:transform 0.2s,box-shadow 0.2s;display:flex;align-items:center;justify-content:center}
.sidebar-toggle:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(244,114,182,0.6)}
.sidebar{position:fixed;top:0;right:-380px;z-index:1500;width:360px;max-width:90vw;height:100vh;background:rgba(15,15,15,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,0.08);transition:right 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:20px 16px}
.sidebar.open{right:0}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-header h2{font-size:16px;font-weight:700;color:#fff}
.sidebar-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:#aaa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sidebar-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.tl-item{position:relative;padding:12px 0 12px 32px;border-left:2px solid rgba(255,255,255,0.08);margin-left:10px;cursor:pointer;transition:background 0.2s;border-radius:8px}
.tl-item:hover{background:rgba(255,255,255,0.03)}
.tl-dot{position:absolute;left:-8px;top:16px;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:2px solid #1a1a2e}
.tl-icon{position:absolute;left:6px;top:18px;font-size:13px}
.tl-name{font-size:14px;font-weight:600;color:#e0e0e0;padding-left:16px}
.tl-date{font-size:11px;color:#666;margin-top:2px;padding-left:16px}
.tl-tag{display:inline-flex;align-items:center;gap:3px;margin-top:4px;padding:2px 8px;background:rgba(96,165,250,0.1);border-radius:6px;font-size:10px;color:#93c5fd;margin-left:16px}
.tl-home{position:relative;padding:10px 0 10px 32px;border-left:2px solid rgba(255,255,255,0.08);margin-left:10px}
.tl-home-dot{position:absolute;left:-8px;top:12px;width:14px;height:14px;border-radius:50%;background:#ef4444;border:2px solid #1a1a2e}
.tl-home-label{font-size:13px;font-weight:600;color:#fca5a5}
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
.modal-header h2{font-size:17px;font-weight:700;color:#fff}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:#aaa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.modal-body{padding:16px 20px 20px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#999;margin-bottom:5px;letter-spacing:0.3px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e0e0e0;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#60a5fa}
.form-group input::placeholder,.form-group textarea::placeholder{color:#555}
.form-group textarea{resize:vertical;min-height:60px}
.form-hint{font-size:11px;color:#555;margin-top:4px}
.form-group select option{background:#1a1a2e;color:#e0e0e0}
.btn-primary{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity 0.2s,transform 0.1s}
.btn-primary:hover{opacity:0.9}
.btn-primary:active{transform:scale(0.98)}
.map-click-hint{position:fixed;bottom:96px;right:28px;z-index:1000;background:rgba(26,26,46,0.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);padding:8px 14px;border-radius:20px;font-size:12px;color:#aaa;display:none;pointer-events:none;animation:fadeHint 3s forwards}
@keyframes fadeHint{0%,70%{opacity:1}100%{opacity:0}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:3000;background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading-overlay{position:fixed;inset:0;z-index:5000;background:#0f0f0f;display:flex;align-items:center;justify-content:center;font-size:14px;color:#888;gap:10px}
.loading-overlay.hidden{display:none}
.loading-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.header-bar{padding:10px 14px}.header-bar h1{font-size:16px}.leaflet-popup-content{width:260px}.popup-photo{height:150px}.popup-body{padding:12px 14px}.popup-name{font-size:15px}.fab{bottom:20px;right:20px;width:50px;height:50px;font-size:24px}.sidebar-toggle{bottom:20px;right:84px;width:50px;height:50px;font-size:20px}.map-click-hint{bottom:82px;right:20px}.form-row{flex-direction:column;gap:0}.sidebar{width:300px}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div>読み込み中...</div>
<div class="header-bar"><h1>Tripp Map</h1><span class="stat-badge" id="spotCount">📍 0 spots</span></div>
<div id="map"></div>
<button class="sidebar-toggle" id="sidebarToggle" title="旅のタイムライン">📋</button>
<button class="fab" id="fabBtn" title="場所を登録">+</button>
<div class="map-click-hint" id="mapHint">地図をクリックしてピンの位置を選択</div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><h2>旅のタイムライン</h2><button class="sidebar-close" id="sidebarClose">&times;</button></div>
  <div id="timelineContainer"></div>
</div>
<div class="modal-overlay" id="tripModalOverlay">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">旅行先を登録</h2><button class="modal-close" id="tripModalClose">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>場所名 *</label><input type="text" id="fName" placeholder="例: 東京タワー" required></div>
      <div class="form-group"><label>住所</label><input type="text" id="fAddress" placeholder="例: 東京都港区芝公園"></div>
      <div class="form-row">
        <div class="form-group"><label>緯度 *</label><input type="number" id="fLat" step="any" placeholder="35.6586" required></div>
        <div class="form-group"><label>経度 *</label><input type="number" id="fLng" step="any" placeholder="139.7454" required></div>
      </div>
      <div class="form-hint">地図をクリックで自動入力されます</div>
      <div class="form-group">
        <label>移動手段 *</label>
        <select id="fTransport">
          <option value="train">🚃 電車</option>
          <option value="shinkansen">🚄 新幹線</option>
          <option value="plane">✈️ フライト</option>
          <option value="car">🚗 車</option>
          <option value="bus">🚌 バス</option>
          <option value="walk">🚶 徒歩</option>
        </select>
      </div>
      <div class="form-group"><label>一言コメント</label><textarea id="fComment" placeholder="印象に残ったことを書きましょう"></textarea></div>
      <div class="form-group"><label>写真URL</label><input type="url" id="fPhoto" placeholder="https://example.com/photo.jpg"></div>
      <div class="form-row">
        <div class="form-group"><label>訪れた日</label><input type="date" id="fDate"></div>
        <div class="form-group"><label>時間</label><input type="time" id="fTime"></div>
      </div>
      <button class="btn-primary" id="registerBtn">ピンを登録する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
